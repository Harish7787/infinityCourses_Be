spring:
  application:
    name: payment-gateway

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: ${PORT:2334}

razorpay:
  key:
    id: ${RAZORPAY_KEY}
    secret: ${RAZORPAY_SECRET}